# =============================================================================
# Training config — Massachusetts Roads Dataset (Section IV-B)
# All hyperparameters from Appendix: Training Setup
# =============================================================================

# Dataset
dataset: massachusetts
data_root: /data/massachusetts_roads
image_size: 256
mask_type: random

# Model architecture (Section III-D)
latent_channels: 256
tpt_depth: 4
tpt_heads: 8
tpt_pyramid: 3
num_ep: 2           # Full model — Table II best configuration
kernel_sigma: 1.0

# Diffusion process (Section III-A)
num_timesteps: 1000
beta_schedule: cosine

# Training (Appendix — Training Setup)
batch_size: 16
lr: 5.0e-5
weight_decay: 0.01
total_iters: 250000
warmup_ratio: 0.10
num_workers: 4

# Logging
log_every: 100
save_every: 5000
output_dir: ./checkpoints/massachusetts
seed: 42
